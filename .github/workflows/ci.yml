# Garde-fou sur les PR : le site doit builder avant merge (un frontmatter invalide
# casserait le déploiement). Note : une PR ouverte avec le GITHUB_TOKEN (workflow de
# rédaction) ne déclenche pas l'événement `opened` — le build y est déjà vérifié dans
# le run de rédaction ; les pushes de retouches @claude déclenchent bien `synchronize`.
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx astro check
      - run: npm run build
