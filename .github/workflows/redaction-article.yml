# Rédaction d'un article par l'agent Claude. Deux usages :
#  - appelée par « Idée d'article » (workflow_call), dans le même run ;
#  - lançable seule à la main (Actions → « Rédaction d'article » → Run workflow).
# L'agent rédige dans une branche article/<slug>, le job vérifie le build, ouvre la PR,
# puis enchaîne la relecture. Prérequis : secret CLAUDE_CODE_OAUTH_TOKEN (`claude setup-token`).
name: Rédaction d'article

on:
  workflow_call:
    inputs:
      idee:
        required: true
        type: string
      notes:
        required: false
        type: string
      relire:
        # Enchaîner la relecture en interne. « Idée d'article » la passe à false
        # car elle gère la relecture en job frère (étiquettes plus lisibles).
        required: false
        type: boolean
        default: true
    outputs:
      branch:
        description: "Branche article/<slug> créée par la rédaction"
        value: ${{ jobs.rediger.outputs.branch }}
  workflow_dispatch:
    inputs:
      idee:
        description: "Idée / inspiration de l'article"
        required: true
        type: string
      notes:
        description: "Notes optionnelles (angle, liens, contraintes)"
        required: false
        type: string
      relire:
        description: "Enchaîner la relecture après la rédaction"
        required: false
        type: boolean
        default: true

# Une rédaction à la fois — les suivantes patientent.
concurrency:
  group: redaction
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  rediger:
    name: Rédaction
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.pr.outputs.branch }}
    steps:
      - uses: actions/checkout@v6

      - name: Configurer l'identité git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rédiger l'article
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Filet de sécurité : en flux normal l'acteur est humain (dispatch) ou le
          # cron de « Idée d'article », mais on tolère le bot github-actions au cas où
          # un run lui serait attribué (garde-fou « non-human actor » de l'action).
          allowed_bots: "github-actions"
          prompt: |
            Tu es l'agent de rédaction du blog dev-fullstack.net.

            1. Lis docs/redaction.md — le guide éditorial, dont les règles de
               confidentialité sont non négociables.
            2. Lis un ou deux articles existants dans src/content/blog/ pour
               t'imprégner du style.
            3. Rédige un article en français à partir de l'idée ci-dessous, dans le
               respect strict du guide. Crée uniquement src/content/blog/<slug>.md
               (slug kebab-case sans accents, unique) avec pubDate = date du jour
               (commande `date +%F`).
            4. Crée une branche article/<slug> (`git switch -c`), puis un commit
               unique, conventionnel et en français :
               - sujet : `feat(blog): <résumé court>` ;
               - corps : 2 à 3 phrases résumant l'article (elles serviront de
                 description à la pull request) ;
               - jamais de trailer Co-Authored-By.
            5. Ne pousse PAS la branche et n'ouvre pas de pull request : le workflow
               s'en charge après avoir vérifié le build.

            <idee>
            ${{ inputs.idee }}
            </idee>

            <notes>
            ${{ inputs.notes }}
            </notes>
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Read,Glob,Grep,Write,Edit,Bash(git:*),Bash(date:*)"

      - name: Installer Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Vérifier le build
        run: |
          npm ci
          npx astro check
          npm run build

      - name: Pousser la branche et ouvrir la PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="$(git branch --show-current)"
          if [ "$BRANCH" = "main" ]; then
            echo "::error::L'agent n'a pas créé de branche article/*."
            exit 1
          fi

          # Garde-fou : seul un nouvel article est admis dans la branche.
          HORS_PERIMETRE="$(git diff --name-only origin/main...HEAD | grep -v '^src/content/blog/' || true)"
          if [ -n "$HORS_PERIMETRE" ]; then
            echo "::error::Fichiers modifiés hors src/content/blog/ : $HORS_PERIMETRE"
            exit 1
          fi

          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --fill
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  # Relecture factuelle enchaînée après l'ouverture de la PR, sauf si le caller la
  # gère lui-même (relire=false, cas du workflow « Idée d'article »).
  relire:
    needs: rediger
    if: ${{ inputs.relire }}
    uses: ./.github/workflows/relecture-article.yml
    secrets: inherit
    with:
      branch: ${{ needs.rediger.outputs.branch }}
