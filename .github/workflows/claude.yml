# Retouches à la demande : commenter « @claude … » sur une PR (ou une issue) et
# l'agent pousse ses corrections sur la branche. Réservé au propriétaire du dépôt
# (repo public : sans ce garde-fou, n'importe qui pourrait déclencher des runs).
name: Claude (mentions)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: >-
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.author_association == 'OWNER'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
